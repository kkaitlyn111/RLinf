defaults:
  - env/maniskill_push_cube@env.train
  - env/maniskill_push_cube@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env: 0-1       # dedicated GPUs for ManiSkill GPU sim
    rollout: 2-3   # dedicated GPUs for pi0.5 inference
    actor: 0-3     # all 4 GPUs for FSDP training (full_shard)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_openpi_pi05_push_cube"
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: 200  # PushCube from domain SFT should converge in ~100-200 epochs; ~20-30 min/epoch → ~2.5-4 days on one 48GB GPU
  max_steps: -1
  only_eval: False
  val_check_interval: 5   # eval every 5 epochs for tight progress tracking over a shorter run
  save_interval: 20       # 10 checkpoints over 200 epochs; saved to {log_path}/{experiment_name}/checkpoints/global_step_N/actor/

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 5

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  # PushCube reward is normalized dense in [0, 1]; always bootstrap since episodes truncate at 50 steps
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 32   # minimum-test-case value; guide shows near-identical performance to 64+
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50

  eval:
    total_num_envs: 64   # slightly more than train for stable success-rate estimates
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10  # pi0.5 uses LIBERO action norm stats universally; action_utils.py converts to ManiSkill format
  enable_offload: True   # offload rollout model to CPU during actor training phase
  pipeline_stage_num: 2  # pipeline overlap between rollout and env stepping

  model:
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"  # download: huggingface-cli download RLinf/RLinf-Pi05-ManiSkill-25Main-SFT --local-dir <path>
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256   # minimum-test-case value; must be multiple of micro_batch_size × num_gpus (32×4=128). grad_accum_steps = 256/128 = 2
  seed: 0
  enable_offload: True     # offload actor model to CPU during rollout phase

  model:
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"  # download: huggingface-cli download RLinf/RLinf-Pi05-ManiSkill-25Main-SFT --local-dir <path>
    model_type: "openpi"
    add_value_head: True
    is_lora: True
    lora_rank: 8   # tutorial default; 32 uses 16× more LoRA params with marginal gain
    num_action_chunks: 5  # 5 chunks × action_horizon=8 = 40 predicted steps per inference call
    num_steps: 4
    openpi:
      value_after_vlm: True
      config_name: "pi05_maniskill"
      num_images_in_input: 1  # PushCube has one base camera
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True  # True for flow_noise

    policy_setup: panda-ee-target-dpos  # PushCube-v1 uses a Panda robot → maps to pd_ee_target_delta_pose control mode (config.py:785); action_utils.py returns raw 7D actions for any "panda" policy

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"  # shard 4B model across 4 GPUs → 2GB/GPU; env+rollout on dedicated GPUs avoids double-copy issue
    gradient_checkpointing: False  # not supported for openpi
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
