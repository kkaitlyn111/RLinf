env_type: maniskill
wrap_obs_mode: "simple"  # use base_camera; "default" hardcodes 3rd_view_camera which doesn't exist in PushCube-v1
state_dim: 8  # truncate to match pi0.5 ManiSkill norm stats (8D = 7 arm joints + 1 gripper finger)

total_num_envs: null

auto_reset: False
ignore_terminations: False
use_rel_reward: True
reward_mode: "raw"  # PushCube-v1 lacks is_src_obj_grasped; use ManiSkill native dense reward
seed: 0
group_size: 1
use_fixed_reset_state_ids: True
max_steps_per_rollout_epoch: 50
max_episode_steps: 50

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False

init_params:
  id: "PushCube-v1"
  num_envs: null
  obs_mode: "rgb+segmentation"
  control_mode: None
  sim_backend: "gpu"
  sim_config:
    sim_freq: 500
    control_freq: 5
  max_episode_steps: ${env.train.max_episode_steps}
  sensor_configs:
    shader_pack: "default"
  render_mode: all
