defaults:
  - env/maniskill_pick_cube_rgb@env.train
  - env/maniskill_pick_cube_rgb@env.eval
  - model/pi0_5@actor.model
  # - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env: 0-1
    rollout: 2-3
    actor: 0-3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "fromsft_ppo_openpi_pickcube"
    logger_backends: ["wandb"]

  max_epochs: 600
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null
  ckpt_path: /juice5b/scr5b/kaitwang/cs234/results/maniskill_sft_openpi_pi05_lora_lr0.00075_bs16/checkpoints/global_step_1600/actor/model.pt

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    # use_ee_proprioception: True
    total_num_envs: 32
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 56

  eval:
    # use_ee_proprioception: True
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 56
    use_fixed_reset_state_ids: True
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True
  pipeline_stage_num: 2

  model:
    # model_path: "/nlp/scr/djghosh/.cache/huggingface/hub/models--RLinf--RLinf-Pi05-ManiSkill-25Main-SFT/snapshots/eb0e2c90726f7f0bdf99e8c9b6656917f0eb5030/"
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 0
  enable_offload: True

  model:
    # model_path: "/nlp/scr/djghosh/.cache/huggingface/hub/models--RLinf--RLinf-Pi05-ManiSkill-25Main-SFT/snapshots/eb0e2c90726f7f0bdf99e8c9b6656917f0eb5030/"
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"
    model_type: "openpi"
    add_value_head: True
    is_lora: True
    lora_rank: 32
    num_action_chunks: 4
    num_steps: 5
    openpi:
      pi05: True
      config_name: "pi05_maniskill_pickcube"
      # config_name: "pi05_maniskill"
      # num_images_in_input: 1
      noise_method: "flow_sde"
      # action_horizon: 8
      # noise_params: [0.16, 0.12, 200]
      # joint_logprob: True

    policy_setup: panda-ee-target-dpos

  optim:
    lr: 2.5e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "shard_grad_op"
    gradient_checkpointing: True
    backward_prefetch: "pre"
    forward_prefetch: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp:
      enabled: true
      precision: "bf16"

reward:
  use_reward_model: False

critic:
  use_critic_model: False