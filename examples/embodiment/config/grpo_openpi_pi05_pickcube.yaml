defaults:
  - env/maniskill_pick_cube_rgb@env.train
  - env/maniskill_pick_cube_rgb@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env: 0-1
    rollout: 2-3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "grpo_openpi_pi05_pickcube"
    logger_backends: ["wandb"]

  max_epochs: 200
  max_steps: -1

  only_eval: False
  val_check_interval: 1
  save_interval: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8

  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 4  # pi0.5 GRPO: multiple gradient steps per rollout for sample efficiency

  reward_type: chunk_level   # pi0.5 assigns reward per action chunk, not per token
  logprob_type: chunk_level  # pi0.5 computes logprob at chunk level (flow model structure)
  entropy_type: token_level ## possible issue?

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"

  kl_beta: 0.0
  entropy_bonus: 0.0  # 0.0 for flow_sde; use 0.005 if switching to flow_noise
  clip_ratio_high: 0.2  # symmetric clipping (0.2/0.2) is standard for pi0.5 GRPO
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True      # drop groups where all envs succeed or all fail (zero variance)
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    use_ee_proprioception: True
    total_num_envs: 32
    group_size: ${algorithm.group_size}
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50  # must be divisible by num_action_chunks (10); 50 = 5 chunks = one full episode
    # wrap_obs_mode: "simple"  # use base_camera only; default mode hardcodes 3rd_view_camera which doesn't exist in PickCube
    # state_dim: 8             # truncate flattened state to 8D (Panda qpos[:8]) to match checkpoint norm stats
  eval:
    use_ee_proprioception: True
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50  # must be divisible by num_action_chunks (10)
    use_fixed_reset_state_ids: True
    group_size: 1
    # wrap_obs_mode: "simple"
    # state_dim: 8
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"  # pi0.5 uses "generation_backend", not "backend"
  recompute_logprobs: False
  unnorm_key: libero_10  # pi0.5 always uses LIBERO action norm stats regardless of task
  enable_offload: True
  pipeline_stage_num: 2

  model:
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32   # reduced from OpenVLA-OFT: pi0.5 is larger; must divide global_batch_size / num_GPUs
  global_batch_size: 128  # = micro_batch_size * 4 GPUs
  seed: 1234
  enable_offload: True

  model:
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"
    model_type: "openpi"
    is_lora: True
    lora_rank: 32
    num_action_chunks: 5
    num_steps: 4
    openpi:
      value_after_vlm: True
      config_name: "pi05_maniskill"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True

    policy_setup: panda-ee-target-dpos

  optim:
    lr: 5.0e-6      # much lower than OpenVLA-OFT (1e-4): pi0.5 is more sensitive to LR
    adam_beta1: 0.9
    adam_beta2: 0.95   # pi0.5 convention; OpenVLA-OFT used 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0     # conservative clipping for pi0.5; OpenVLA-OFT used 10.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard" 
    gradient_checkpointing: False   # MUST be False for pi0.5 + LoRA (not supported together)
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
