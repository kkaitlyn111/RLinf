defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    # experiment_name: "maniskill_sft_openpi_pi05_lora"
    experiment_name: "maniskill_sft_openpi_pi05_lora_lr${actor.optim.lr}_bs${actor.micro_batch_size}"
    logger_backends: ["wandb"]

  max_epochs: 1000
  max_steps: -1
  val_check_interval: -1
  save_interval: 200

data:
  data_path: "/juice5b/scr5b/kaitwang/cs234/maniskill-demos"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 64
  seed: 0

  model:
    precision: null
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/RLinf-Pi05-ManiSkill-25Main-SFT"
    num_action_chunks: 4
    num_steps: 5
    add_value_head: True
    is_lora: True
    lora_rank: 32
    openpi:
      pi05: True
      config_name: "pi05_maniskill_pickcube"
      noise_method: "flow_sde"
      train_expert_only: False

  optim:
    # lr: 1e-3
    # value_lr: 1e-3
    # adam_beta1: 0.9
    # adam_beta2: 0.95
    # adam_eps: 1.0e-05
    # weight_decay: 0.01
    # clip_grad: 1.0

    # # defaults from rlinf - lowkey very bad, don't use
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp:
      enabled: true
      precision: "bf16"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
