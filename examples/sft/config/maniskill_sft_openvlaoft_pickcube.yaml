defaults:
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_sft_openvlaoft_pickcube"
    logger_backends: ["wandb"]

  max_epochs: 1000
  max_steps: -1
  val_check_interval: -1
  save_interval: 5

data:
  data_path: "/juice5b/scr5b/kaitwang/cs234/maniskill-demos"
  task_instruction: "pick up the cube"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 64 
  seed: 0

  model:
    model_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/models--Haozhan72--Openvla-oft-SFT-libero10-trajall/snapshots/97d6e58bc5fbc402e85bab382e4206bb8e5f0db0"
    model_type: "openvla_oft"

    unnorm_key: bridge_orig
    policy_setup: "panda-ee-target-dpos"
    add_value_head: True

    # precision: "bf16"

    is_lora: True
    lora_rank: 32
    lora_path: "/juice5b/scr5b/kaitwang/cache/huggingface/hub/models--RLinf--RLinf-OpenVLAOFT-ManiSkill-Base-Lora/snapshots/102dc3c7cd4262a4f28a8cf303d792bcd68b7058"
    max_prompt_length: 30

  optim:
    lr: 5e-5
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 10.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp:
      enabled: true
      precision: "bf16"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
